# Nome comum em repos GitHub; este workflow e o que o Actions costuma acionar no push.
name: Python package

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: flake8 renomear_ebooks.py tests/

      # Caminho explicito: evita exit code 5 do pytest (nenhum teste coletado) se o padrao de busca mudar.
      - name: Test with pytest
        run: python -m pytest -q tests/
        env:
          PYTHONPATH: ${{ github.workspace }}
