# Workflow principal de CI: lint (uma vez) + testes em matriz (3.9-3.12).
name: Python package

on:
  push:
    branches: ["master", "main"]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: ["master", "main"]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"

permissions:
  contents: read

# Cancela execucoes anteriores no mesmo branch/PR — economiza minutos de Actions.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint with flake8
        run: flake8 renomear_ebooks.py tests/

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements-dev.txt

      # Caminho explicito: evita exit code 5 do pytest (nenhum teste coletado) se o padrao mudar.
      - name: Test with pytest
        run: python -m pytest -q tests/
        env:
          PYTHONPATH: ${{ github.workspace }}
